name: CI

on:
  pull_request:
    # PRs gegen den reinen Daten-Branch `retros` (Retro-Analyse) enthalten
    # keinen Code — die CI-Matrix würde dort nur scheitern.
    branches-ignore: [retros]
  # Pushes auf main laufen nicht hier: der Release-Workflow führt vor dem
  # Publish dasselbe `pnpm run ci`-Gate aus, ein zweiter Lauf wäre doppelt.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Coverage ratchet (thresholds in vitest.config.ts)
        run: pnpm run test:coverage
      - name: Electron UI smoke
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
        run: xvfb-run -a pnpm run test:ui-smoke

  e2e-smoke:
    # Separate job: Playwright-driven Electron can be flakier than unit tests,
    # and the screenshot/report artifacts are wanted even on failure.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Seeded E2E smoke (screenshots + overlap/duplicate checks)
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          CI: 'true'
        run: xvfb-run -a pnpm run test:e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e-artifacts/
          retention-days: 14

  windows-build:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Electron UI smoke
        run: pnpm run test:ui-smoke

  ios-build:
    # The iOS Mission-Control client was previously never built in CI. Build +
    # unit-test it unsigned against a simulator so Swift regressions surface.
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build and test (simulator, unsigned)
        working-directory: apps/ios
        run: |
          DEST=$(xcrun simctl list devices available | grep -Eo 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: ${DEST:-iPhone 15}"
          xcodebuild test \
            -project MissionControl.xcodeproj \
            -scheme MissionControl \
            -destination "platform=iOS Simulator,name=${DEST:-iPhone 15}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            | tail -50

  macos-build:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Electron UI smoke
        run: pnpm run test:ui-smoke
      - name: Package universal macOS app
        run: pnpm exec electron-builder --mac --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
