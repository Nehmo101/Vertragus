name: CI

on:
  pull_request:
  push:
    branches: [main, DEV]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Electron UI smoke
        run: xvfb-run -a pnpm run test:ui-smoke

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Electron UI smoke
        run: pnpm run test:ui-smoke
