name: Release

# Push a tag like v0.1.0 to build + publish installers to a GitHub Release.
# Or run manually (workflow_dispatch) to just build the installers as artifacts.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main
        run: pnpm build

      - name: Package installers
        # Publishes to the GitHub Release on tag pushes; otherwise just builds.
        run: >-
          pnpm exec electron-builder
          --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-strator-${{ matrix.os }}
          path: |
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
          if-no-files-found: warn
