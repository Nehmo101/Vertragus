name: Release

# Every main push publishes a prerelease on the self-update channel.
# Tags continue to publish normal releases; manual runs only upload artifacts.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Läufe pro Ref serialisieren statt abbrechen: ein abgebrochener Publish
# könnte ein halb hochgeladenes Release hinterlassen, und der jeweils
# neueste main-Stand soll auch als letztes Prerelease erscheinen.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: pnpm

      - name: Cache Electron binaries
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Electron binaries
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Electron binaries
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify and build renderer + main
        run: pnpm run ci

      - name: Determine main-channel version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: main-version
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = require('./package.json')
            const [major, minor, rawPatch] = pkg.version.split('.')
            const patch = Number(rawPatch.split('-')[0]) + Number(process.env.GITHUB_RUN_NUMBER)
            const attempt = process.env.GITHUB_RUN_ATTEMPT || '1'
            const shortSha = context.sha.slice(0, 7)
            core.setOutput('version', `${major}.${minor}.${patch}-main.${attempt}.g${shortSha}`)

      - name: Detect complete macOS signing credentials
        if: runner.os == 'macOS' && github.event_name == 'push'
        id: mac-signing
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$MAC_CSC_LINK" && -n "$MAC_CSC_KEY_PASSWORD" && -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and publish main update
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          (runner.os != 'macOS' || steps.mac-signing.outputs.ready == 'true')
        run: >-
          pnpm exec electron-builder
          --config electron-builder.main.yml
          --config.extraMetadata.version=${{ steps.main-version.outputs.version }}
          --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || runner.os == 'macOS' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}

      - name: Package and publish unsigned macOS main update
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          runner.os == 'macOS' && steps.mac-signing.outputs.ready != 'true'
        run: >-
          pnpm exec electron-builder
          --config electron-builder.main.yml
          --config.extraMetadata.version=${{ steps.main-version.outputs.version }}
          --config.mac.notarize=false
          --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package and publish tagged release
        if: >-
          startsWith(github.ref, 'refs/tags/') &&
          (runner.os != 'macOS' || steps.mac-signing.outputs.ready == 'true')
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || runner.os == 'macOS' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}

      - name: Package and publish unsigned tagged macOS release
        if: >-
          startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS' &&
          steps.mac-signing.outputs.ready != 'true'
        run: >-
          pnpm exec electron-builder
          --config.mac.notarize=false
          --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package installers for manual run
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'false' || '' }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vertragus-${{ matrix.os }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.zip
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.yml
            release/**/*.blockmap
          if-no-files-found: error

      - name: Attest installer provenance
        # disabled: attestations require a public repo or org-owned private repo.
        # Beim Reaktivieren oben wieder `id-token: write` und
        # `attestations: write` zu den permissions hinzufügen.
        if: false
        uses: actions/attest@v4
        with:
          subject-path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.zip
            release/**/*.AppImage
            release/**/*.deb
