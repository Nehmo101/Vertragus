name: Release

# Every main push publishes a prerelease on the self-update channel.
# Tags continue to publish normal releases; manual runs only upload artifacts.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify and build renderer + main
        run: pnpm run ci

      - name: Determine main-channel version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: main-version
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = require('./package.json')
            const [major, minor, rawPatch] = pkg.version.split('.')
            const patch = Number(rawPatch.split('-')[0]) + Number(process.env.GITHUB_RUN_NUMBER)
            const attempt = process.env.GITHUB_RUN_ATTEMPT || '1'
            core.setOutput('version', `${major}.${minor}.${patch}-main.${attempt}`)

      - name: Package and publish main update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >-
          pnpm exec electron-builder
          --config electron-builder.main.yml
          --config.extraMetadata.version=${{ steps.main-version.outputs.version }}
          --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package and publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package installers for manual run
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec electron-builder --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-strator-${{ matrix.os }}
          path: |
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.yml
            release/**/*.blockmap
          if-no-files-found: warn

      - name: Attest installer provenance
        if: github.event_name != 'workflow_dispatch'
        uses: actions/attest@v4
        with:
          subject-path: |
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
