appId: dev.nehmo.vertragus
productName: Vertragus
publish:
  provider: github
  owner: Nehmo101
  repo: Orca-Strator
directories:
  buildResources: build
  output: release/${version}
files:
  - out/**/*
  - apps/mobile/dist/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icons
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Nehmo101
  artifactName: ${productName}-${version}.${ext}
