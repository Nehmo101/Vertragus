appId: dev.nehmo.orca-strator
productName: Orca-Strator
publish:
  provider: github
  owner: Nehmo101
  repo: Orca-Strator
directories:
  buildResources: build
  output: release/${version}
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
mac:
  icon: build/icon.icns
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icons
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Nehmo101
  artifactName: ${productName}-${version}.${ext}
